<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garmin OS</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#8bac0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="gb-container">
        {% if session.get('user') %}
        <nav class="gb-nav">
            <div class="nav-links">
                <a href="{{ url_for('kpis') }}" class="{% if request.endpoint == 'kpis' %}active{% endif %}">KPIs</a>
                <a href="{{ url_for('week_progress') }}" class="{% if request.endpoint == 'week_progress' %}active{% endif %}">WEEK</a>
            </div>
            <div class="nav-actions">
                <button id="syncBtn" class="gb-btn icon-btn" title="Sync Data">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2v4.264C8.016 6.643 5 9.948 5 14H3c0-4.97 4.03-9 9-9V2l4.5 4-4.5 4zM12 22v-4.264c3.984-.379 7-3.684 7-7.736h2c0 4.97-4.03 9-9 9v3l-4.5-4 4.5-4z"/></svg>
                </button>
                <a href="{{ url_for('logout') }}" class="gb-btn icon-btn logout-btn" title="Logout">X</a>
            </div>
        </nav>
        {% endif %}

        <div class="gb-screen">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Sync Modal -->
    <div id="syncModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>SYSTEM SYNC</h2>
                <span class="close">&times;</span>
            </div>
            <div id="syncLogs" class="logs"></div>
        </div>
    </div>

    <script>
        const syncBtn = document.getElementById('syncBtn');
        const modal = document.getElementById('syncModal');
        const closeBtn = document.querySelector('.close');
        const logsDiv = document.getElementById('syncLogs');
        let pollInterval;

        if(syncBtn) {
            syncBtn.onclick = function() {
                modal.style.display = "flex";
                fetch('{{ url_for("run_sync") }}', {method: 'POST'})
                    .then(r => r.json())
                    .then(data => {
                        pollLogs();
                        pollInterval = setInterval(pollLogs, 1000);
                    });
            }
        }
        if(closeBtn) {
            closeBtn.onclick = function() {
                modal.style.display = "none";
                if(pollInterval) clearInterval(pollInterval);
                location.reload();
            }
        }

        function pollLogs() {
            fetch('{{ url_for("get_sync_status") }}')
                .then(r => r.json())
                .then(data => {
                    logsDiv.innerHTML = data.logs.join('<br>');
                    logsDiv.scrollTop = logsDiv.scrollHeight;
                    if(!data.is_running && data.logs.length > 0) {
                        clearInterval(pollInterval);
                        if(data.error) {
                            logsDiv.innerHTML += '<br><span style="color:var(--gb-darkest)">ERROR: ' + data.error + '</span>';
                        } else {
                            logsDiv.innerHTML += '<br>SYNC COMPLETE. CLOSE TO REFRESH.';
                        }
                    }
                });
        }
    </script>
</body>
</html>
